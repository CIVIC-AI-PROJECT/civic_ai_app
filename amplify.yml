version: 1
frontend:
  phases:
    preBuild:
      commands:
        - if [ ! -d "flutter" ]; then git clone https://github.com/flutter/flutter.git --depth 1 -b stable; fi
        - export PATH="$PATH:`pwd`/flutter/bin"
        - flutter doctor
        - flutter pub get

    build:
      commands:
        - flutter build web

  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'

  cache:
    paths:
      - flutter
      - ~/.pub-cache